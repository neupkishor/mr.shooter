<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Shooter POV</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="hud">
    <div id="crosshair"></div>
    <div id="info">Click to Play</div>
    <div id="stats">
      <div>Score: <span id="score">0</span></div>
      <div>Ammo: <span id="ammo">30</span></div>
      <div>Weapon: <span id="weapon-name">Pistol</span> (1-3)</div>
      <div id="status" style="font-size: 10px; color: #555;">Initializing...</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
