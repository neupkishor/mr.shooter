<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Funny Shooter</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="hud">
    <div id="notification-area"></div>
    <div id="crosshair"></div>
    <canvas id="minimap"></canvas>

    <!-- Main Menu Screen -->
    <div id="main-menu" class="overlay">
      <h1 class="glitch" data-text="THE FUNNY SHOOTER">THE FUNNY SHOOTER</h1>

      <div class="menu-buttons">
        <button id="start-mission-btn" class="primary-btn">START MISSION</button>
        <button id="open-settings-btn" class="secondary-btn">SETTINGS</button>
      </div>

      <div class="leaderboard">
        <h3>TOP OPERATIVES</h3>
        <ul id="high-scores-list">
          <li>NONE YET</li>
        </ul>
      </div>

      <div class="controls-hint">
        WASD to Move | Mouse to Look | 1-3 to Switch Weapons | SPACE to Jump
      </div>
    </div>

    <!-- Settings Screen -->
    <div id="settings-screen" class="overlay" style="display: none;">
      <h1>SYSTEM CONFIG</h1>

      <div class="setting-group">
        <label>DIFFICULTY</label>
        <div class="difficulty-options">
          <button class="diff-btn" data-level="easy">EASY</button>
          <button class="diff-btn active" data-level="medium">MEDIUM</button>
          <button class="diff-btn" data-level="hard">HARD</button>
        </div>
      </div>

      <button id="back-to-menu-btn" class="secondary-btn">BACK TO MENU</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="overlay" style="display: none;">
      <h1>MISSION FAILED</h1>
      <div id="final-stats">
        <p>Score: <span id="final-score">0</span></p>
        <p>Survived: <span id="final-time">0</span>s</p>
      </div>
      <button id="restart-button" class="primary-btn">RETRY MISSION</button>
      <button id="menu-from-death-btn" class="secondary-btn">MAIN MENU</button>
    </div>

    <div id="stats">
      <div class="health-container">
        <div id="health-bar"></div>
        <span id="health-text">HP: 100</span>
      </div>
      <div>Level: <span id="level">1</span> / 20</div>
      <div>Score: <span id="score">0</span></div>
      <div>Ammo: <span id="ammo">30</span></div>
      <div>Weapon: <span id="weapon-name">Pistol</span> (1-3)</div>
      <div id="status" style="font-size: 10px; color: #555;">Initializing...</div>
    </div>
    <div id="stats-right">
      <div>Enemies Alive: <span id="enemy-alive">0</span></div>
      <div>Enemies Total: <span id="enemy-count">0</span></div>
      <div>Spawn Rate: <span id="spawn-rate">0</span>s</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
